services:
  - type: web
    name: agente-base-conocimiento
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python src/web_app.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_API_KEY
        sync: false
